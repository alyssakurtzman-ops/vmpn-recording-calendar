<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VMPN Recording Calendar</title>
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --text-primary: #1a1a1a; --text-secondary: #555; --text-muted: #888; --text-accent: #2563eb;
    --surface-0: #f8f8f8; --surface-1: #f0f0f0; --surface-2: #ffffff;
    --border: #e0e0e0; --border-strong: #ccc; --border-accent: #93c5fd;
    --bg-accent: #eff6ff; --bg-success: #f0fdf4; --border-success: #86efac; --text-success: #166534;
    --radius: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans); background: #f5f5f5; color: var(--text-primary); min-height: 100vh; padding: 24px 16px; }
  .page-wrap { max-width: 1200px; margin: 0 auto; }
  .cal-wrap { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; }
  .toolbar-title { font-size: 18px; font-weight: 600; color: var(--text-primary); flex: 1; min-width: 160px; }
  .toolbar-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .view-toggle { display: flex; border: 1px solid var(--border-strong); border-radius: var(--radius); overflow: hidden; }
  .vt-btn { background: transparent; border: none; padding: 6px 12px; font-size: 12px; color: var(--text-secondary); cursor: pointer; font-family: var(--font-sans); }
  .vt-btn.active { background: var(--surface-1); color: var(--text-primary); font-weight: 500; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .filter-label { font-size: 12px; color: var(--text-secondary); margin-right: 2px; }
  .show-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; cursor: pointer; border: 1.5px solid transparent; white-space: nowrap; font-weight: 500; transition: opacity 0.15s; user-select: none; }
  .show-pill.off { opacity: 0.28; }
  .toggle-all { font-size: 11px; padding: 3px 10px; border-radius: 20px; cursor: pointer; border: 1.5px solid var(--border-strong); background: transparent; color: var(--text-secondary); white-space: nowrap; font-weight: 500; user-select: none; margin-right: 4px; font-family: var(--font-sans); }
  .toggle-all:hover { background: var(--surface-1); }
  .nav-row { display: flex; align-items: center; gap: 10px; margin-bottom: 0.75rem; }
  .nav-btn { background: transparent; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 5px 13px; cursor: pointer; font-size: 14px; color: var(--text-primary); font-family: var(--font-sans); }
  .nav-btn:hover { background: var(--surface-1); }
  .period-label { font-size: 15px; font-weight: 600; color: var(--text-primary); min-width: 200px; text-align: center; }
  .dow-row { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; margin-bottom: 1px; }
  .dow { font-size: 10px; color: var(--text-muted); text-align: center; padding: 4px 0; text-transform: uppercase; letter-spacing: .05em; font-weight: 500; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .day-cell { background: var(--surface-2); min-height: 130px; padding: 6px 5px; }
  .day-cell.other { background: var(--surface-0); opacity: .5; }
  .day-cell.today { background: var(--bg-accent); }
  .day-num { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .day-cell.today .day-num { color: var(--text-accent); font-weight: 700; }
  .ev { font-size: 10px; padding: 2px 5px; border-radius: 3px; margin-bottom: 2px; cursor: pointer; line-height: 1.35; font-weight: 500; overflow: hidden; }
  .ev:hover { filter: brightness(.88); }
  .ev-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .ev-time { font-size: 9px; opacity: .72; display: block; white-space: nowrap; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: .85rem; padding-top: .85rem; border-top: 1px solid var(--border); align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
  .leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  /* Studio view */
  .studio-scroll { overflow-x: auto; }
  .studio-grid { display: grid; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; min-width: 700px; }
  .sg-corner { background: var(--surface-1); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 8px 10px; font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .04em; }
  .sg-pod-header { background: var(--surface-1); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 8px 10px; font-size: 12px; font-weight: 600; color: var(--text-primary); text-align: center; }
  .sg-pod-header:last-child { border-right: none; }
  .sg-pod-sub { font-size: 10px; font-weight: 400; color: var(--text-muted); display: block; margin-top: 1px; }
  .sg-day-label { background: var(--surface-0); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 10px; font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; }
  .sg-day-label.today-row { background: var(--bg-accent); }
  .sg-dow { font-size: 10px; color: var(--text-muted); font-weight: 400; display: block; }
  .sg-day-label.today-row .sg-date-num { color: var(--text-accent); }
  .sg-cell { background: var(--surface-2); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 5px; min-height: 70px; }
  .sg-cell:last-child { border-right: none; }
  .sg-cell.today-row { background: var(--bg-accent); }
  .sg-last .sg-day-label, .sg-last .sg-cell { border-bottom: none; }
  .studio-ev { font-size: 10px; padding: 3px 6px; border-radius: 3px; margin-bottom: 3px; cursor: pointer; line-height: 1.4; font-weight: 500; }
  .studio-ev:hover { filter: brightness(.88); }
  .studio-ev-name { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
  .studio-ev-time { display: block; font-size: 9px; opacity: .8; white-space: nowrap; }
  .studio-ev-talent { display: block; font-size: 9px; opacity: .7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  /* List view */
  .list-view { margin-top: .25rem; }
  .list-day { margin-bottom: 1.1rem; }
  .list-day-hdr { font-size: 11px; font-weight: 600; color: var(--text-secondary); padding: 4px 0; border-bottom: 1px solid var(--border); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
  .list-ev { display: flex; align-items: center; gap: 9px; padding: 7px 5px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 4px; }
  .list-ev:hover { background: var(--surface-0); }
  .list-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .list-show { font-weight: 600; color: var(--text-primary); font-size: 13px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-detail { font-size: 11px; color: var(--text-secondary); flex: 1.5; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .list-pod { font-size: 11px; color: var(--text-muted); white-space: nowrap; min-width: 50px; }
  .list-time { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: flex-start; justify-content: center; padding-top: 60px; z-index: 200; }
  .modal-card { background: #fff; border: 1px solid var(--border-strong); border-radius: 12px; padding: 1.4rem; width: 420px; max-width: 94vw; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.12); }
  .mc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 8px; }
  .mc-title { font-size: 15px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
  .mc-close { cursor: pointer; color: var(--text-muted); font-size: 22px; line-height: 1; flex-shrink: 0; }
  .mc-close:hover { color: var(--text-primary); }
  .mc-badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; margin-bottom: 4px; }
  .mc-source { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 500; margin-bottom: 12px; margin-left: 4px; background: var(--surface-1); color: var(--text-muted); border: 0.5px solid var(--border-strong); }
  .mc-row { display: flex; gap: 8px; margin-bottom: 9px; font-size: 13px; align-items: flex-start; }
  .mc-key { color: var(--text-secondary); min-width: 90px; flex-shrink: 0; padding-top: 1px; }
  .mc-val { color: var(--text-primary); line-height: 1.4; }
  .mc-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .talent-chip { display: inline-block; background: var(--surface-1); border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 2px 8px; font-size: 12px; color: var(--text-primary); margin: 2px 3px 2px 0; }
  .status-chip { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .status-confirmed { background: #d1fae5; color: #065f46; }
  .status-potential  { background: #fef3c7; color: #92400e; }
  .status-hold       { background: #fee2e2; color: #991b1b; }
  .source-note { font-size: 11px; color: var(--text-muted); margin-top: 1rem; padding-top: .75rem; border-top: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .source-note a { color: var(--text-accent); text-decoration: none; }
  .source-note a:hover { text-decoration: underline; }
</style>
</head>

const SOURCE_LABELS = { skedda: 'Skedda (Live)', happyhour: 'Happy Hour with Ina Garten' };
const PODS = [
  {key:'Pod 1',label:'Pod 1',sub:'4 Seat, Multicam'},
  {key:'Pod 2',label:'Pod 2',sub:'2 Seat, Multicam'},
  {key:'Pod 3',label:'Pod 3',sub:'1 Seat, Multicam'},
  {key:'Pod 4',label:'Pod 4',sub:'1 Seat, Virtual BG'},
  {key:'Pod 5',label:'Pod 5',sub:'2 Seats, Virtual BG'},
  {key:'Pod 6',label:'Pod 6',sub:'2 Seats, Multicam'},
];
const PALETTE=[
  {bg:'#d6e8fa',tx:'#0c447c'},{bg:'#c8f0e0',tx:'#085041'},{bg:'#fce8d8',tx:'#4a1b0c'},
  {bg:'#ece8fc',tx:'#26215c'},{bg:'#fde8f0',tx:'#4b1528'},{bg:'#faf3da',tx:'#412402'},
  {bg:'#dff4e8',tx:'#173404'},{bg:'#f9e0e0',tx:'#501313'},{bg:'#e8f4fc',tx:'#042c53'},
  {bg:'#f5ece0',tx:'#3a2010'},{bg:'#e4f0e8',tx:'#1a3a22'},{bg:'#f0e8f8',tx:'#3a1560'},
  {bg:'#fef9e0',tx:'#7a5c00'},{bg:'#f0f4e8',tx:'#2a3a04'},{bg:'#e8f0fc',tx:'#042c63'},
];
const CLR={};let ci=0;
function clr(s){if(!CLR[s]){CLR[s]=PALETTE[ci%PALETTE.length];ci++;}return CLR[s];}
const allShows=[...new Set(E.map(e=>e.show))];
allShows.forEach(s=>clr(s));

let active=new Set(allShows),view='month';
let vDate=new Date();vDate.setDate(1);
let wDate=getWeekStart(new Date());

function getWeekStart(d){const day=d.getDay();const diff=day===0?-6:1-day;const m=new Date(d);m.setDate(d.getDate()+diff);m.setHours(0,0,0,0);return m;}
function pDate(str){const[m,d,y]=str.split('/');return new Date(+y,+m-1,+d);}
function fmtTime(t){if(!t||t==='TBD')return'TBD';return t.replace(':00 ',' ').replace(' AM',' am').replace(' PM',' pm');}
function dateKey(dt){return(dt.getMonth()+1)+'/'+dt.getDate()+'/'+dt.getFullYear();}
function filtered(){return E.filter(e=>active.has(e.show));}

function buildFilters(){
  const row=document.getElementById('filter-row');
  row.innerHTML='<span class="filter-label">Show:</span>';
  const btn=document.createElement('button');
  btn.id='toggle-all-btn';btn.className='toggle-all';
  btn.textContent='Deselect All';btn.onclick=toggleAll;row.appendChild(btn);
  allShows.forEach(show=>{
    const c=clr(show);const p=document.createElement('span');
    p.className='show-pill'+(active.has(show)?'':' off');
    p.dataset.show=show;
    p.style.cssText='background:'+c.bg+';color:'+c.tx+';border-color:'+c.tx+'35';
    p.textContent=show;
    p.onclick=()=>{active.has(show)?active.delete(show):active.add(show);p.classList.toggle('off',!active.has(show));updateToggleBtn();renderCurrent();};
    row.appendChild(p);
  });
}
function toggleAll(){const allOn=active.size===allShows.length;if(allOn)active.clear();else allShows.forEach(s=>active.add(s));document.querySelectorAll('.show-pill').forEach(p=>p.classList.toggle('off',!active.has(p.dataset.show)));updateToggleBtn();renderCurrent();}
function updateToggleBtn(){const btn=document.getElementById('toggle-all-btn');if(btn)btn.textContent=active.size===allShows.length?'Deselect All':'Select All';}

function renderMonth(){
  const grid=document.getElementById('cal-grid'),label=document.getElementById('period-label');
  const y=vDate.getFullYear(),m=vDate.getMonth();
  const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  label.textContent=MONTHS[m]+' '+y;
  const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),today=new Date();
  const byDate={};filtered().forEach(ev=>{(byDate[ev.d]=byDate[ev.d]||[]).push(ev);});
  let cells=[];const prev=new Date(y,m,0).getDate();
  for(let i=first-1;i>=0;i--)cells.push({day:prev-i,curr:false});
  for(let d=1;d<=dim;d++)cells.push({day:d,curr:true,dateObj:new Date(y,m,d)});
  while(cells.length%7)cells.push({day:cells.length-first-dim+1,curr:false});
  grid.innerHTML=cells.map(cell=>{
    const isToday=cell.curr&&cell.dateObj&&cell.dateObj.getFullYear()===today.getFullYear()&&cell.dateObj.getMonth()===today.getMonth()&&cell.dateObj.getDate()===today.getDate();
    const ds=cell.curr&&cell.dateObj?dateKey(cell.dateObj):'';
    const evs=byDate[ds]||[];
    const pills=evs.map((ev,idx)=>{
      const c=clr(ev.show);const dash=ev.source!=='skedda'?';border:1.5px dashed '+c.tx+'60':'';
      const short=ev.show==='Happy Hour with Ina Garten'?'Happy Hour w/ Ina':ev.show;
      const guest=ev.talent&&ev.talent!=='TBD'?' · '+ev.talent.split(/[,\/]/)[0].trim():'';
      return '<div class="ev" style="background:'+c.bg+';color:'+c.tx+dash+'" onclick="openModal(event,''+ds+'','+idx+')"><span class="ev-name">'+short+'</span><span class="ev-time">'+fmtTime(ev.s)+guest+'</span></div>';
    }).join('');
    return '<div class="day-cell'+(cell.curr?'':' other')+(isToday?' today':'')+'"><div class="day-num">'+cell.day+'</div>'+pills+'</div>';
  }).join('');
  renderLegend('legend');
}

function renderStudio(){
  const days=[];for(let i=0;i<7;i++){const d=new Date(wDate);d.setDate(wDate.getDate()+i);days.push(d);}
  const today=new Date(),MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  document.getElementById('period-label-studio').textContent=MO[days[0].getMonth()]+' '+days[0].getDate()+' – '+MO[days[6].getMonth()]+' '+days[6].getDate()+', '+days[6].getFullYear();
  const byDatePod={};filtered().forEach(ev=>{const pn=(ev.pod.match(/\d+/)||[''])[0];const key=ev.d+'|Pod '+pn;(byDatePod[key]=byDatePod[key]||[]).push(ev);});
  const grid=document.getElementById('studio-grid');
  grid.className='studio-grid';grid.style.gridTemplateColumns='90px repeat('+PODS.length+', 1fr)';
  let html='<div class="sg-corner">Date</div>';
  PODS.forEach(p=>{html+='<div class="sg-pod-header">'+p.label+'<span class="sg-pod-sub">'+p.sub+'</span></div>';});
  days.forEach((day,dayIdx)=>{
    const ds=dateKey(day);
    const isToday=day.getFullYear()===today.getFullYear()&&day.getMonth()===today.getMonth()&&day.getDate()===today.getDate();
    const tc=isToday?' today-row':'',lc=dayIdx===days.length-1?' sg-last':'';
    html+='<div class="sg-day-label'+tc+lc+'"><span class="sg-dow">'+DOW[day.getDay()]+'</span><span class="sg-date-num">'+MO[day.getMonth()]+' '+day.getDate()+'</span></div>';
    PODS.forEach(pod=>{
      const evs=byDatePod[ds+'|'+pod.key]||[];let cc='';
      evs.forEach(ev=>{
        const c=clr(ev.show);const border=ev.source!=='skedda'?'border:1.5px dashed '+c.tx+'60;':'';
        const short=ev.show==='Happy Hour with Ina Garten'?'Happy Hour w/ Ina':ev.show;
        const timeStr=ev.s==='TBD'?'TBD':fmtTime(ev.s)+(ev.e?'–'+fmtTime(ev.e):'');
        const tal=ev.talent&&ev.talent!=='TBD'?ev.talent.split(/[,\/]/)[0].trim():'';
        const evJson=JSON.stringify(ev).replace(/'/g,"\\'").replace(/"/g,'&quot;');
        cc+='<div class="studio-ev" style="background:'+c.bg+';color:'+c.tx+';'+border+'" onclick='showModal('+evJson+')'>'+
            '<span class="studio-ev-name">'+short+'</span>'+
            '<span class="studio-ev-time">'+timeStr+'</span>'+
            (tal?'<span class="studio-ev-talent">'+tal+'</span>':'')+
            '</div>';
      });
      html+='<div class="sg-cell'+tc+lc+'">'+cc+'</div>';
    });
  });
  grid.innerHTML=html;renderLegend('legend-studio');
}

function renderList(){
  const con=document.getElementById('list-view'),byDate={};
  filtered().forEach(ev=>{(byDate[ev.d]=byDate[ev.d]||[]).push(ev);});
  const sorted=Object.keys(byDate).sort((a,b)=>pDate(a)-pDate(b));
  const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  con.innerHTML=sorted.map(date=>{
    const d=pDate(date),dow=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    const hdr=dow+', '+MO[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
    const rows=byDate[date].map((ev,idx)=>{
      const c=clr(ev.show);
      const border=ev.source!=='skedda'?'border:1.5px dashed '+c.tx+'60;border-radius:4px;padding:6px 5px;':'';
      const detail=ev.talent&&ev.talent!=='TBD'?ev.talent:ev.booking;
      return '<div class="list-ev" style="'+border+'" onclick="openModal(event,''+date+'','+idx+')">'+
        '<div class="list-dot" style="background:'+c.bg+';border:1px solid '+c.tx+'50"></div>'+
        '<div class="list-show">'+ev.show+'</div>'+
        '<div class="list-detail">'+detail+'</div>'+
        '<div class="list-pod">'+ev.pod+'</div>'+
        '<div class="list-time">'+fmtTime(ev.s)+'</div></div>';
    }).join('');
    return '<div class="list-day"><div class="list-day-hdr">'+hdr+'</div>'+rows+'</div>';
  }).join('');
}

function renderLegend(id){
  const leg=document.getElementById(id);
  leg.innerHTML=allShows.map(s=>{const c=clr(s);return'<div class="leg-item"><div class="leg-dot" style="background:'+c.bg+';border:1px solid '+c.tx+'40"></div><span>'+s+'</span></div>';}).join('')+
  '<div class="leg-item" style="margin-left:auto;padding-left:12px;border-left:1px solid var(--border)"><span style="display:inline-block;width:14px;height:10px;border:1.5px dashed #888;border-radius:2px;margin-right:5px;vertical-align:middle"></span><span>Partner calendar</span></div>';
}

function openModal(e,dateStr,idx){
  e.stopPropagation();
  const evs=E.filter(ev=>ev.d===dateStr&&active.has(ev.show));
  const ev=evs[idx];if(!ev)return;showModal(ev);
}

function showModal(ev){
  const c=clr(ev.show);
  const tc=ev.talent&&!['—','no','na','tbd',''].includes(ev.talent.toLowerCase())
    ?ev.talent.split(/,\s*/).map(t=>'<span class="talent-chip">'+t.trim()+'</span>').join('')
    :'<span style="color:#888;font-size:13px">TBD</span>';
  const sr=ev.status?'<div class="mc-row"><span class="mc-key">📋 Status</span><span class="mc-val"><span class="status-chip status-'+ev.status+'">'+(ev.status==='confirmed'?'✓ Confirmed':ev.status==='potential'?'⏳ Potential':'⚠ Hold')+'</span></span></div>':'';
  const or=ev.opStatus?'<div class="mc-row"><span class="mc-key">🎛 Op Status</span><span class="mc-val">'+ev.opStatus+'</span></div>':'';
  const br=ev.booker?'<div class="mc-row"><span class="mc-key">👤 Booker</span><span class="mc-val">'+ev.booker+'</span></div>':'';
  const dr=ev.drink?'<div class="mc-row"><span class="mc-key">🍹 Drink</span><span class="mc-val">'+ev.drink+'</span></div>':'';
  const ts=ev.s==='TBD'?'TBD':ev.s+(ev.e?' – '+ev.e:'');
  document.getElementById('modal-root').innerHTML='<div class="modal-bg" onclick="closeModal()"><div class="modal-card" onclick="event.stopPropagation()">'+
    '<div class="mc-header"><span class="mc-title">'+ev.booking+'</span><span class="mc-close" onclick="closeModal()">×</span></div>'+
    '<span class="mc-badge" style="background:'+c.bg+';color:'+c.tx+'">'+ev.show+'</span>'+
    '<span class="mc-source">📂 '+(SOURCE_LABELS[ev.source]||ev.source)+'</span>'+
    '<hr class="mc-divider">'+
    '<div class="mc-row"><span class="mc-key">📅 Date</span><span class="mc-val">'+ev.d+'</span></div>'+
    '<div class="mc-row"><span class="mc-key">🕐 Time</span><span class="mc-val">'+ts+'</span></div>'+
    '<div class="mc-row"><span class="mc-key">📺 Studio</span><span class="mc-val">'+ev.pod+'</span></div>'+
    (ev.type?'<div class="mc-row"><span class="mc-key">🎬 Type</span><span class="mc-val">'+ev.type+'</span></div>':'')+
    sr+or+br+
    '<hr class="mc-divider">'+
    '<div class="mc-row" style="align-items:flex-start"><span class="mc-key" style="padding-top:4px">🎤 Talent</span><span class="mc-val">'+tc+'</span></div>'+
    dr+'</div></div>';
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

function setView(v){
  view=v;
  document.getElementById('month-view').style.display=v==='month'?'':'none';
  document.getElementById('studio-view').style.display=v==='studio'?'':'none';
  document.getElementById('list-view').style.display=v==='list'?'':'none';
  document.getElementById('btn-month').classList.toggle('active',v==='month');
  document.getElementById('btn-studio').classList.toggle('active',v==='studio');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  renderCurrent();
}
function renderCurrent(){if(view==='month')renderMonth();else if(view==='studio')renderStudio();else renderList();}
function prevPeriod(){if(view==='month'){vDate=new Date(vDate.getFullYear(),vDate.getMonth()-1,1);}else if(view==='studio'){wDate=new Date(wDate);wDate.setDate(wDate.getDate()-7);}renderCurrent();}
function nextPeriod(){if(view==='month'){vDate=new Date(vDate.getFullYear(),vDate.getMonth()+1,1);}else if(view==='studio'){wDate=new Date(wDate);wDate.setDate(wDate.getDate()+7);}renderCurrent();}

buildFilters();renderCurrent();
</script>
</body></html>
